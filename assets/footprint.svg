<svg width="760" height="322" viewBox="0 0 760 322" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif">
  <text x="16" y="26" font-size="14" font-weight="600" fill="#7d8590">Memory under load (MB) — 1,000 inserts + 1,000 filtered reads · lower is better</text>
  <!-- PocketBase: 24 -->
  <text x="176" y="58" font-size="13" fill="#7d8590" text-anchor="end">PocketBase</text>
  <text x="176" y="71" font-size="10" fill="#7d8590" fill-opacity="0.75" text-anchor="end">SQLite</text>
  <path d="M186 50h8a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-8z" fill="#71717a"/>
  <text x="205" y="64" font-size="13" fill="#7d8590">24</text>
  <!-- tinbase binary: 66 -->
  <text x="176" y="96" font-size="13" font-weight="600" fill="#059669" text-anchor="end">tinbase (binary)</text>
  <text x="176" y="109" font-size="10" fill="#7d8590" fill-opacity="0.75" text-anchor="end">real Postgres + RLS</text>
  <path d="M186 88h22a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-22z" fill="#059669"/>
  <text x="219" y="102" font-size="13" fill="#7d8590">66</text>
  <!-- tinbase native: 100 -->
  <text x="176" y="134" font-size="13" font-weight="600" fill="#059669" text-anchor="end">tinbase (native)</text>
  <text x="176" y="147" font-size="10" fill="#7d8590" fill-opacity="0.75" text-anchor="end">real Postgres + RLS</text>
  <path d="M186 126h33a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-33z" fill="#059669"/>
  <text x="230" y="140" font-size="13" fill="#7d8590">100</text>
  <!-- tinbase pg-mem: 185 -->
  <text x="176" y="172" font-size="13" font-weight="600" fill="#059669" text-anchor="end">tinbase (pg-mem)</text>
  <text x="176" y="185" font-size="10" fill="#7d8590" fill-opacity="0.75" text-anchor="end">in-memory subset · 3.6 MB, pure JS</text>
  <path d="M186 164h61a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-61z" fill="#059669" fill-opacity="0.8"/>
  <text x="258" y="178" font-size="13" fill="#7d8590">185</text>
  <!-- tinbase wasm: ~640 -->
  <text x="176" y="210" font-size="13" font-weight="600" fill="#059669" text-anchor="end">tinbase (wasm)</text>
  <text x="176" y="223" font-size="10" fill="#7d8590" fill-opacity="0.75" text-anchor="end">real Postgres · browser-ready</text>
  <path d="M186 202h211a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H186z" fill="#059669" fill-opacity="0.55"/>
  <text x="408" y="216" font-size="13" fill="#7d8590">~640</text>
  <!-- Supabase local: 1626 -->
  <text x="176" y="248" font-size="13" fill="#7d8590" text-anchor="end">Supabase local</text>
  <text x="176" y="261" font-size="10" fill="#7d8590" fill-opacity="0.75" text-anchor="end">Postgres · 12 containers</text>
  <path d="M186 240h537a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H186z" fill="#71717a"/>
  <text x="716" y="254" font-size="13" fill="#7d8590" text-anchor="end" font-weight="600">1,626</text>
  <text x="16" y="286" font-size="11.5" fill="#7d8590">Physical footprint of the whole process tree (vmmap / docker stats), Apple Silicon · macOS 15 · bench/footprint.ts</text>
  <text x="16" y="304" font-size="11.5" fill="#7d8590" fill-opacity="0.75">wasm is PGlite's WASM heap (~575–650 MB, GC-timing dependent); pg-mem is a pure-JS in-memory subset (no RLS/realtime), the lightest to embed.</text>
</svg>
